<VirtualHost *:80>
    ServerName localhost

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/

    # Optionally serve static files directly through Apache
    # Alias /static /home/gescol/src/static
    # <Directory /home/gescol/src/static>
    #     Require all granted
    # </Directory>

    ErrorLog ${APACHE_LOG_DIR}/gescol_error.log
    CustomLog ${APACHE_LOG_DIR}/gescol_access.log combined
</VirtualHost>
