<div class="welcome-card" style="animation: fadeIn 0.3s;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <button class="magalu-btn" style="background: #6c757d; width: auto; padding: 10px 20px;" hx-get="/cadastros/hub"
            hx-target="#content">
            ← Voltar
        </button>

        <h2 style="color: var(--magalu-blue); font-size: 1.8rem; font-weight: 800;">Gestão de Usuários</h2>

        <button class="magalu-btn" style="width: auto; padding: 10px 20px;" hx-get="/cadastros/usuarios/novo"
            hx-target="#content">
            + Novo Usuário
        </button>
    </div>

    <!-- Barra de Filtros -->
    <div
        style="background: #fdfdfd; padding: 15px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);">
        <div style="flex: 1; min-width: 180px;">
            <label
                style="font-size: 0.8rem; font-weight: bold; color: #666; margin-bottom: 5px; display: block;">Nome</label>
            <input type="text" class="table-filter" placeholder="Filtrar por nome..." id="filter-user-nome"
                style="width: 100%;">
        </div>
        <div style="flex: 1; min-width: 150px;">
            <label
                style="font-size: 0.8rem; font-weight: bold; color: #666; margin-bottom: 5px; display: block;">Login</label>
            <input type="text" class="table-filter" placeholder="Filtrar login..." id="filter-user-login"
                style="width: 100%;">
        </div>
        <div style="flex: 1; min-width: 100px;">
            <label
                style="font-size: 0.8rem; font-weight: bold; color: #666; margin-bottom: 5px; display: block;">CD</label>
            <input type="text" class="table-filter" placeholder="Filtrar CD..." id="filter-user-cd"
                style="width: 100%;">
        </div>
        <div style="flex: 1; min-width: 150px;">
            <label
                style="font-size: 0.8rem; font-weight: bold; color: #666; margin-bottom: 5px; display: block;">Nível</label>
            <select class="table-filter" id="filter-user-nivel" style="width: 100%;">
                <option value="">Todos</option>
                <option value="10">Nível 10 (Admin)</option>
                <option value="9">Nível 9 (Gestor)</option>
                <option value="1">Nível 1 (Operador)</option>
            </select>
        </div>
    </div>

    <div style="overflow-x: auto; background: white; border-radius: 8px;">
        <table class="magalu-table">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Usuário (Login)</th>
                    <th>CD</th>
                    <th style="text-align: center;">Nível de Acesso</th>
                    <th style="text-align: center;">Ações</th>
                </tr>
            </thead>
            <tbody id="table-usuarios-body">
                {% for u in users %}
                <tr id="user-{{ u.id }}">
                    <td style="font-weight: 600;">{{ u.name }}</td>
                    <td style="color: #666;">{{ u.username }}</td>
                    <td>CD {{ u.cd }}</td>
                    <td style="text-align: center;">
                        <span class="badge {{ 'badge-active' if u.user_level >= 9 else '' }}" style="background: {{ '#e3f2fd' if u.user_level == 10 else '#f5f5f5' }}; 
                                     color: {{ '#1976d2' if u.user_level == 10 else '#666' }};
                                     border-color: {{ '#bbdefb' if u.user_level == 10 else '#ddd' }};">
                            Lvl {{ u.user_level }}
                        </span>
                    </td>
                    <td style="text-align: center;">
                        <div style="display: flex; justify-content: center; gap: 10px;">
                            <button class="magalu-btn"
                                style="background: #ffa000; padding: 6px 15px; font-size: 0.8rem; width: auto;"
                                hx-get="/cadastros/usuarios/editar/{{ u.id }}" hx-target="#content">
                                Editar
                            </button>
                            <button class="magalu-btn"
                                style="background: #d32f2f; padding: 6px 15px; font-size: 0.8rem; width: auto;"
                                hx-delete="/cadastros/usuarios/excluir/{{ u.id }}"
                                hx-confirm="Deseja remover o acesso deste usuário?" hx-target="#user-{{ u.id }}"
                                hx-swap="outerHTML">
                                Excluir
                            </button>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <script src="/static/js/users_filter.js"></script>
</div>
