<div id="employee-data">
    <div style="margin-bottom: 15px;">
        <label style="display: block; font-size: 0.85rem; color: #666;">Nome do Colaborador</label>
        <input type="text" name="name" class="magalu-input" value="{{ emp.name if emp else '' }}" readonly
            style="background: #f4f4f4; cursor: not-allowed;">
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
        <div>
            <label style="display: block; font-size: 0.85rem; color: #666;">CD</label>
            <input type="text" name="cd" class="magalu-input" value="{{ emp.filial if emp else '' }}" readonly
                style="background: #f4f4f4; cursor: not-allowed;">
        </div>
        <div>
            <label style="display: block; font-size: 0.85rem; color: #666;">Cargo</label>
            <input type="text" name="role" class="magalu-input" value="{{ emp.cargo if emp else '' }}" readonly
                style="background: #f4f4f4; cursor: not-allowed;">
        </div>
    </div>

    {% if not emp and id_magalu %}
    <p style="color: #e67e22; font-size: 0.85rem; font-weight: bold;">⚠️ Nenhum colaborador encontrado com este ID.</p>
    {% endif %}
</div>
