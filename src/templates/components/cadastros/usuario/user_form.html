<div class="welcome-card" style="max-width: 600px; margin: 0 auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="color: var(--magalu-blue);">Novo Usuário de Sistema</h2>
        <button hx-get="/cadastros/usuarios" hx-target="#content" class="magalu-btn" style="width: auto; background: #666;">Cancelar</button>
    </div>

    <form hx-post="/cadastros/usuarios/salvar" hx-target="#content">
        <div style="margin-bottom: 15px;">
            <label style="font-weight: bold; display: block; margin-bottom: 5px;">ID Magalu (6 dígitos)</label>
            <input type="number" name="id_magalu" class="magalu-input" 
                   placeholder="Digite o ID para buscar..." 
                   hx-get="/cadastros/usuarios/buscar-colaborador" 
                   hx-trigger="keyup changed delay:500ms" 
                   hx-target="#employee-data"
                   hx-swap="outerHTML"
                   required>
        </div>

        <div id="employee-data">
            <p style="color: #999; font-style: italic; font-size: 0.9rem;">Insira o ID Magalu para carregar os dados do colaborador...</p>
        </div>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

        <div style="margin-bottom: 15px;">
            <label style="font-weight: bold; display: block; margin-bottom: 5px;">Username (Login)</label>
            <input type="text" name="username" class="magalu-input" placeholder="Ex: joao.silva" required>
        </div>

        <div style="margin-bottom: 15px;">
            <label style="font-weight: bold; display: block; margin-bottom: 5px;">Senha Inicial</label>
            <input type="password" name="password" class="magalu-input" required>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="font-weight: bold; display: block; margin-bottom: 5px;">Nível de Acesso</label>
            <select name="user_level" class="magalu-input" required>
                <option value="1">1 - Usuário Normal</option>
                <option value="2">2 - Liderança</option>
                {% if admin_level == 10 %}
                <option value="9">9 - Admin Local</option>
                <option value="10">10 - Super Admin</option>
                {% endif %}
            </select>
        </div>

        <button type="submit" class="magalu-btn">Criar Acesso</button>
    </form>
</div>
