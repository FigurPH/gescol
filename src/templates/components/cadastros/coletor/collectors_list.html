<div class="welcome-card" style="animation: fadeIn 0.3s;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <button class="magalu-btn" style="background: #6c757d; width: auto; padding: 10px 20px;" hx-get="/cadastros/hub"
            hx-target="#content">
            ← Voltar
        </button>

        <h2 style="color: var(--magalu-blue); font-size: 1.8rem; font-weight: 800;">Cadastro de Coletores</h2>

        <div style="display: flex; gap: 10px;">
            {% if user_level >= 9 %}
            <form hx-post="/cadastros/coletores/upload-csv" hx-encoding="multipart/form-data"
                hx-target="#csv-upload-result" hx-swap="innerHTML">
                <input type="file" name="file" id="csv-file-input" style="display: none;"
                    onchange="this.form.requestSubmit()">
                <button type="button" class="magalu-btn" style="background: #2e7d32; width: auto; padding: 10px 20px;"
                    onclick="document.getElementById('csv-file-input').click()">
                    📁 Importar CSV
                </button>
            </form>
            {% endif %}

            <button class="magalu-btn" style="width: auto; padding: 10px 20px;" hx-get="/cadastros/coletores/novo"
                hx-target="#content">
                + Novo Coletor
            </button>
        </div>
    </div>

    <div id="csv-upload-result"></div>

    <!-- Barra de Filtros -->
    <div
        style="background: #fdfdfd; padding: 15px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);">
        <div style="flex: 1; min-width: 180px;">
            <label style="font-size: 0.8rem; font-weight: bold; color: #666; margin-bottom: 5px; display: block;">Nome /
                Patrimônio</label>
            <input type="text" class="table-filter" placeholder="Filtrar nome..." id="filter-nome" style="width: 100%;">
        </div>
        <div style="flex: 1; min-width: 150px;">
            <label
                style="font-size: 0.8rem; font-weight: bold; color: #666; margin-bottom: 5px; display: block;">Modelo</label>
            <input type="text" class="table-filter" placeholder="Filtrar modelo..." id="filter-modelo"
                style="width: 100%;">
        </div>
        <div style="flex: 1; min-width: 150px;">
            <label
                style="font-size: 0.8rem; font-weight: bold; color: #666; margin-bottom: 5px; display: block;">Série</label>
            <input type="text" class="table-filter" placeholder="Filtrar série..." id="filter-serie"
                style="width: 100%;">
        </div>
        <div style="flex: 1; min-width: 120px;">
            <label
                style="font-size: 0.8rem; font-weight: bold; color: #666; margin-bottom: 5px; display: block;">Status</label>
            <select class="table-filter" id="filter-status" style="width: 100%;">
                <option value="">Todos</option>
                <option value="ativo">Ativo</option>
                <option value="inativo">Inativo</option>
            </select>
        </div>
    </div>

    <div style="overflow-x: auto; background: white; border-radius: 8px;">
        <table class="magalu-table">
            <thead>
                <tr>
                    <th>Nome / Patrimônio</th>
                    <th>Modelo</th>
                    <th>Série</th>
                    <th style="text-align: center;">Status</th>
                    <th style="text-align: center;">Ações</th>
                </tr>
            </thead>
            <tbody id="table-coletores-body">
                {% for c in collectors %}
                <tr id="collector-{{ c.id }}">
                    <td style="font-weight: 600;">{{ c.name }}</td>
                    <td>{{ c.model }}</td>
                    <td style="font-family: 'Courier New', monospace; color: #666;">{{ c.serialnumber }}</td>
                    <td style="text-align: center;">
                        <span class="badge {{ 'badge-active' if c.is_active else 'badge-inactive' }}">
                            {{ "ATIVO" if c.is_active else "INATIVO" }}
                        </span>
                    </td>
                    <td style="text-align: center;">
                        <div style="display: flex; justify-content: center; gap: 10px;">
                            <button class="magalu-btn"
                                style="background: #ffa000; padding: 6px 15px; font-size: 0.8rem; width: auto;"
                                hx-get="/cadastros/coletores/editar/{{ c.id }}" hx-target="#content">
                                Editar
                            </button>
                            <button class="magalu-btn"
                                style="background: #d32f2f; padding: 6px 15px; font-size: 0.8rem; width: auto;"
                                hx-delete="/cadastros/coletores/excluir/{{ c.id }}" hx-confirm="Excluir este coletor?"
                                hx-target="#collector-{{ c.id }}" hx-swap="outerHTML">
                                Excluir
                            </button>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <script src="/static/js/collectors_filter.js"></script>
</div>
