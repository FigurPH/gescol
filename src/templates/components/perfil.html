<div class="welcome-card" style="max-width: 600px; margin: 0 auto; animation: fadeIn 0.3s;">
    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 25px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px;">
        <div style="background: var(--magalu-blue); border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
            <span style="font-size: 1.8rem;">👤</span>
        </div>
        <div>
            <h2 style="color: var(--magalu-blue); margin: 0;">{{ user_name }}</h2>
            <span style="color: #888; font-size: 0.9rem;">@{{ user.username }} &middot; Nível {{ user_level }}</span>
        </div>
    </div>

    <h3 style="color: #444; margin-bottom: 15px;">🔒 Trocar Senha</h3>

    <div id="senha-feedback" style="margin-bottom: 10px;"></div>

    <form hx-post="/auth/perfil/trocar-senha" hx-target="#senha-feedback" hx-swap="innerHTML">
        <div style="margin-bottom: 15px;">
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">Senha Atual</label>
            <input type="password" name="senha_atual" class="magalu-input" placeholder="••••••••" required>
        </div>
        <div style="margin-bottom: 15px;">
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">Nova Senha</label>
            <input type="password" name="nova_senha" class="magalu-input" placeholder="••••••••" required>
        </div>
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">Confirmar Nova Senha</label>
            <input type="password" name="confirmar_senha" class="magalu-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="magalu-btn" style="width: 100%;">Salvar Nova Senha</button>
    </form>
</div>
